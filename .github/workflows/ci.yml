name: Angular CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Build Project
      # This compiles your Angular application
      run: npm run build

    - name: Run Tests
      # If you have tests, this will run them. 
      # The --watch=false ensures the CI doesn't get stuck waiting for file changes.
      run: npm run test -- --watch=false
